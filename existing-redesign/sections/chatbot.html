<!-- Floating Conversational AI Copilot Launcher with Label "Ask Indium AI" -->
<div class="ai-copilot-launcher-container" style="position: fixed; bottom: 25px; right: 25px; z-index: 1000; display: flex; align-items: center; gap: 10px;">
  <div class="copilot-launcher-label" style="background: var(--bg-glass-heavy); border: 1px solid var(--border-glass-bright); padding: 0.5rem 1rem; border-radius: 20px; color: var(--text-primary); font-family: var(--font-heading); font-size: 0.8rem; font-weight: 600; box-shadow: 0 4px 15px rgba(0,0,0,0.4); opacity: 1; transition: var(--transition-fast);">
    Ask Indium AI
  </div>
  <div class="ai-copilot-launcher" id="copilot-toggle-btn" style="position: static; margin: 0;">
    <svg class="launcher-icon" viewBox="0 0 24 24">
      <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
      <path d="M12 2v9M8 5h8"/>
    </svg>
  </div>
</div>

<div class="copilot-panel" id="copilot-sidebar-panel">
  <div class="copilot-header">
    <div class="copilot-profile">
      <div class="copilot-avatar">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5">
          <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
        </svg>
      </div>
      <div class="copilot-details">
        <span class="copilot-name">Ask Indium AI</span>
        <span class="copilot-status">Consultant online</span>
      </div>
    </div>
    <button class="copilot-close" id="copilot-close-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    </button>
  </div>
  
  <div class="copilot-messages" id="copilot-chat-messages">
    <div class="bubble bot">
      Greetings! I am Indium's enterprise AI coordinator. I can help map your legacy challenges, calculate migration costs, or recommend custom integration steps. How shall we begin?
    </div>
  </div>

  <div class="copilot-suggestions">
    <span class="suggestion-pill" data-ask="How does The Lifter resolve legacy tech debt?">How does The Lifter work?</span>
    <span class="suggestion-pill" data-ask="Give me details on your Medicare success story.">Medicare success story</span>
    <span class="suggestion-pill" data-ask="Explain your gaming QA services.">iXie Gaming services</span>
  </div>
  
  <div class="copilot-input-area">
    <input type="text" id="copilot-chat-input" class="copilot-input" placeholder="Type technical queries..." autocomplete="off">
    <button id="copilot-send-btn" class="copilot-send-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>
</div>
